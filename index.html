<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arciform Timer</title>

<style>
@font-face {
  font-family: 'Arciform';
  src: url('https://files.catbox.moe/q3bupi.otf') format('opentype');
  font-display: swap;
}

:root {
  --bg: #111;
  --text: #fff;
  --btn-hover: #2a2a2a;
  --btn-active: #3a3a3a;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f5;
    --text: #111;
    --btn-hover: #e0e0e0;
    --btn-active: #d5d5d5;
  }
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Arciform', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: background 0.2s ease;
}

/* 🚨 FLASHING RED WHEN DONE */
body.done {
  animation: flashRed 0.6s infinite;
}

@keyframes flashRed {
  0%   { background: var(--bg); }
  50% { background: #843f3f; }
  100% { background: var(--bg); }
}

   

.stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: padding-top 0.7s cubic-bezier(0.2,0.8,0.2,1);
}

body.running .stage {
  padding-top: 120px;
}

/* TIMER */
#display {
  font-size: 6rem;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
  text-align: center;
  font-family: 'Arciform', sans-serif;
  transition: transform 0.4s cubic-bezier(0.2,0.8,0.2,1);
}

/* 🔥 BIGGER WHEN RUNNING */
body.running #display {
  transform: scale(1.35);
}

/* controls */
.controls {
  margin-top: 40px;
  display: flex;
  gap: 40px;
  transition: opacity 0.25s ease, transform 0.7s cubic-bezier(0.2,0.8,0.2,1);
}

#startBtn {
  margin-top: 35px;
  font-size: 1.6rem;
  border: none;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  padding: 8px 18px;
  font-family: 'Arciform', sans-serif;
}

.circle-btn {
  font-size: 2.4rem;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--text);
  cursor: pointer;
}

.circle-btn:hover { background: var(--btn-hover); }
.circle-btn:active { background: var(--btn-active); }

body.running .controls,
body.running #startBtn {
  opacity: 0;
  transform: translateY(-20px);
  pointer-events: none;
  margin: 0;
}

body.running .controls {
  margin-top: 0;
}
</style>
</head>

<body>

<div class="stage">

  <input id="display" value="00:00" inputmode="text" autocomplete="off" />

  <div class="controls">
    <button class="circle-btn" id="minusBtn">−</button>
    <button class="circle-btn" id="plusBtn">+</button>
  </div>

  <button id="startBtn">Start</button>

</div>

<script>
let running = false;
let finished = false;
let interval = null;
let holdInterval = null;

const display = document.getElementById('display');

/* -------- INPUT FILTER -------- */
display.addEventListener('keydown', (e) => {
  if (running) {
    e.preventDefault();
    return;
  }

  const allowedKeys = [
    'Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'
  ];

  if (allowedKeys.includes(e.key)) return;

  if (e.key >= '0' && e.key <= '9') return;
  if (e.key === ':') return;

  e.preventDefault();
});

display.addEventListener('input', () => {
  if (running) return;

  let v = display.value;
  v = v.replace(/[^0-9:]/g, '');

  const parts = v.split(':');
  if (parts.length > 3) {
    v = parts.slice(0, 3).join(':');
  }

  display.value = v;
});

/* -------- TIMER LOGIC -------- */

function parseTime(str) {
  const p = str.split(':').map(n => parseInt(n.trim(),10));
  if (p.some(isNaN)) return null;
  if (p.length === 2) return p[0]*60 + p[1];
  if (p.length === 3) return p[0]*3600 + p[1]*60 + p[2];
  return null;
}

function formatTime(s) {
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;

  return h > 0
    ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function getSeconds() {
  return parseTime(display.value) || 0;
}

function setSeconds(s) {
  display.value = formatTime(Math.max(0,s));
}

/* -------- RESET -------- */

function resetUI() {
  clearInterval(interval);
  clearInterval(holdInterval);

  running = false;
  finished = false;

  document.body.classList.remove('running','done');
}

/* -------- FINISH -------- */

function finish() {
  clearInterval(interval);
  running = false;
  finished = true;

  document.body.classList.add('done');
}

/* -------- START -------- */

function startTimer() {
  if (running) return;

  let seconds = getSeconds();
  if (seconds <= 0) return;

  running = true;

  document.body.classList.add('running');

  interval = setInterval(() => {
    seconds--;
    setSeconds(seconds);

    if (seconds <= 0) finish();
  }, 1000);
}

/* -------- CONTROLS -------- */

function adjust(a) {
  if (running) return;
  setSeconds(Math.max(0, getSeconds() + a));
}

function startHold(a) {
  if (running) return;
  adjust(a);
  holdInterval = setInterval(() => adjust(a), 120);
}

function stopHold() {
  clearInterval(holdInterval);
}

document.getElementById('minusBtn').addEventListener('mousedown', () => startHold(-60));
document.getElementById('plusBtn').addEventListener('mousedown', () => startHold(60));
document.getElementById('minusBtn').addEventListener('mouseup', stopHold);
document.getElementById('plusBtn').addEventListener('mouseup', stopHold);

document.getElementById('startBtn').onclick = startTimer;

/* -------- GLOBAL RESET ON CLICK -------- */
document.body.addEventListener('click', () => {
  if (finished || document.body.classList.contains('done')) {
    resetUI();
  }
});

/* -------- HOTKEY -------- */
window.addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 'r') resetUI();
});







/* Prevent focusing */
display.addEventListener('focus', () => {
  if (running) display.blur();
});




</script>

</body>
</html>
